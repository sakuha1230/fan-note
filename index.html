<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>追星手帳</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.1.0/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Caveat:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F2ECDD; --paper-card:#FBF7ED; --ink:#3A342A; --ink-soft:#6B6252; --ink-faint:#9C9282;
  --line:#D9CFB8; --line-strong:#C2B694; --accent:#7A2E2A; --accent-soft:#C97F6E; --accent-bg:#F3E0D4;
  --sage:#5C6B4F; --sage-bg:#E6EADB; --gold:#A9791F; --gold-bg:#F3E4B8; --dusk:#4A5568;
  --shadow:rgba(58,52,42,0.12); --radius-card:14px;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--paper);
  background-image:radial-gradient(circle at 20% 30%, rgba(122,46,42,0.025) 0, transparent 45%),radial-gradient(circle at 80% 80%, rgba(92,107,79,0.03) 0, transparent 50%);
  color:var(--ink);font-family:'Noto Serif TC',serif;font-weight:400;line-height:1.7;}
.hand{font-family:'Caveat',cursive;}
.app{max-width:960px;margin:0 auto;padding:20px 18px 100px;}
a{color:var(--accent);}

/* ---- buttons ---- */
.btn{font-family:'Noto Serif TC',serif;font-size:13px;padding:8px 14px;border-radius:999px;border:1px solid var(--line-strong);
  background:var(--paper-card);color:var(--ink);cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background .15s,transform .1s;}
.btn:hover{background:#EFE6CC;}
.btn:active{transform:scale(.97);}
.btn.primary{background:var(--accent);color:#FBF3EA;border-color:var(--accent);}
.btn.primary:hover{background:#6B2723;}
.btn.ghost{border-color:transparent;background:transparent;}
.btn.small{font-size:12px;padding:5px 10px;}
.btn.danger{color:var(--accent);border-color:var(--accent-soft);}
.btn:disabled{opacity:.4;cursor:not-allowed;}

/* ---- top bar ---- */
.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.brand{display:flex;align-items:center;gap:8px;font-size:18px;font-weight:600;}
.brand i{color:var(--accent);}
.crumb{font-size:13px;color:var(--ink-soft);display:flex;align-items:center;gap:6px;cursor:pointer;}
.crumb i{font-size:14px;}

/* ---- section card ---- */
.card{background:var(--paper-card);border:1px solid var(--line);border-radius:var(--radius-card);padding:18px 20px;box-shadow:0 1px 6px var(--shadow);margin-bottom:14px;}
.section-head{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;margin-bottom:12px;flex-wrap:wrap;}
.section-title{font-size:17px;font-weight:600;margin:0;display:flex;align-items:center;gap:7px;}
.section-title i{color:var(--accent);font-size:17px;}
.section-desc{font-size:12.5px;color:var(--ink-soft);margin:3px 0 0;}
.empty{text-align:center;padding:32px 16px;color:var(--ink-faint);border:1px dashed var(--line-strong);border-radius:var(--radius-card);background:rgba(255,255,255,.3);}
.empty i{font-size:24px;margin-bottom:6px;display:block;}
.empty p{margin:3px 0;font-size:13px;}

/* ---- form fields ---- */
.field-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:9px;}
.field-row input,.field-row select,.field-row textarea{
  font-family:'Noto Serif TC',serif;font-size:13.5px;padding:8px 10px;border-radius:8px;border:1px solid var(--line);
  background:#fff;color:var(--ink);}
.field-row input:focus,.field-row select:focus,.field-row textarea:focus{outline:none;border-color:var(--accent-soft);}
.field-label{font-size:12px;color:var(--ink-soft);margin-bottom:3px;display:block;}

/* ---- modal ---- */
.modal-mask{position:fixed;inset:0;background:rgba(58,52,42,.35);display:none;align-items:center;justify-content:center;z-index:999;padding:20px;overflow-y:auto;}
.modal-mask.open{display:flex;}
.modal{background:var(--paper-card);border-radius:16px;padding:22px;max-width:440px;width:100%;box-shadow:0 8px 30px rgba(0,0,0,.2);margin:auto;}
.modal h3{margin:0 0 14px;font-size:16px;font-weight:600;display:flex;align-items:center;gap:7px;}
.modal .field-row{flex-direction:column;}
.modal .field-row input,.modal .field-row select,.modal .field-row textarea{width:100%;}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;}
.modal-scroll{max-height:70vh;overflow-y:auto;padding-right:4px;margin:0 -4px;}

/* ---- tags/chips ---- */
.tag{display:inline-block;font-size:11px;padding:3px 9px;border-radius:999px;margin:0 6px 6px 0;}
.tag.sage{background:var(--sage-bg);color:var(--sage);}
.tag.accent{background:var(--accent-bg);color:var(--accent);}
.tag.gold{background:var(--gold-bg);color:var(--gold);}
.chip-pick{display:inline-flex;align-items:center;font-size:12.5px;padding:5px 12px;border-radius:999px;border:1px solid var(--line);background:var(--paper-card);cursor:pointer;color:var(--ink-soft);margin:0 6px 6px 0;}
.chip-pick.on{background:var(--accent);color:#fff;border-color:var(--accent);}

/* ---- floating idol switcher ---- */
.fab-wrap{position:fixed;right:20px;bottom:20px;z-index:500;display:flex;flex-direction:column;align-items:flex-end;gap:10px;}
.fab-menu{background:var(--paper-card);border:1px solid var(--line);border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.18);padding:10px;display:none;flex-direction:column;gap:4px;min-width:190px;margin-bottom:2px;}
.fab-menu.open{display:flex;}
.fab-menu-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;cursor:pointer;font-size:13.5px;color:var(--ink);}
.fab-menu-item:hover{background:var(--paper);}
.fab-menu-item.active{background:var(--accent-bg);color:var(--accent);font-weight:500;}
.fab-menu-item .avatar{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;font-weight:500;background-size:cover;background-position:center;}
.fab-menu-divider{height:1px;background:var(--line);margin:5px 2px;}
.fab-btn{width:56px;height:56px;border-radius:50%;background:var(--accent);border:3px solid var(--paper-card);box-shadow:0 4px 16px rgba(0,0,0,.22);cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:600;overflow:hidden;background-size:cover;background-position:center;}
.fab-btn i{font-size:22px;}

/* ---- home quick log ---- */
.quicklog-input{width:100%;font-family:'Noto Serif TC',serif;font-size:14px;padding:11px 13px;border-radius:10px;border:1px solid var(--line);background:#fff;resize:vertical;min-height:48px;color:var(--ink);}
.quicklog-row{display:flex;gap:8px;margin-top:9px;align-items:center;flex-wrap:wrap;}
.idol-select-pills{display:flex;gap:6px;flex-wrap:wrap;}
.idol-pill{display:flex;align-items:center;gap:6px;padding:6px 12px 6px 6px;border-radius:999px;border:1px solid var(--line);background:var(--paper);font-size:12.5px;cursor:pointer;color:var(--ink-soft);}
.idol-pill.active{border-color:var(--accent);background:var(--accent-bg);color:var(--ink);font-weight:500;}
.idol-pill .dot{width:16px;height:16px;border-radius:50%;flex-shrink:0;background-size:cover;background-position:center;}

/* ---- timeline (shared) ---- */
.timeline{position:relative;padding-left:20px;}
.timeline::before{content:'';position:absolute;left:5px;top:5px;bottom:5px;width:1px;background:var(--line-strong);}
.t-item{position:relative;margin-bottom:16px;}
.t-item::before{content:'';position:absolute;left:-20px;top:3px;width:10px;height:10px;border-radius:50%;background:var(--paper-card);border:2px solid var(--accent);}
.t-date{font-size:11.5px;color:var(--ink-faint);margin-bottom:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.t-ago{font-family:'Caveat',cursive;font-size:15px;color:var(--ink-faint);}
.t-body{font-size:13.5px;white-space:pre-wrap;}
.t-idol-badge{font-size:10.5px;padding:1px 8px;border-radius:999px;color:#fff;}

/* ---- home dashboard grids ---- */
.home-grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:640px){.home-grid2{grid-template-columns:1fr;}}
.throwback-card{background:linear-gradient(160deg,var(--gold-bg) 0%,#EAD9A8 100%);border-radius:12px;padding:14px 16px;margin-bottom:10px;}
.throwback-card .tb-label{font-size:11px;color:var(--gold);font-weight:500;margin-bottom:4px;display:flex;align-items:center;gap:5px;}
.throwback-card .tb-text{font-size:13.5px;color:#5A4419;}

.res-mini-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border:1px solid var(--line);border-radius:9px;background:var(--paper-card);margin-bottom:6px;font-size:12.5px;}
.res-mini-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

.todo-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border:1px solid var(--line);border-radius:9px;background:var(--paper-card);margin-bottom:6px;}
.todo-check{width:18px;height:18px;border-radius:5px;border:2px solid var(--line-strong);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;}
.todo-check.on{background:var(--sage);border-color:var(--sage);color:#fff;}
.todo-text{font-size:13px;flex:1;}
.todo-text.done{text-decoration:line-through;color:var(--ink-faint);}

/* ---- schedule / calendar ---- */
.conflict-banner{background:var(--gold-bg);border:1px solid #D9BE7C;color:var(--gold);border-radius:10px;padding:11px 13px;font-size:12.5px;margin-bottom:12px;display:flex;gap:8px;align-items:flex-start;}
.sched-item{display:flex;gap:11px;align-items:center;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:var(--paper-card);margin-bottom:7px;}
.sched-item.clash{border-color:var(--gold);background:var(--gold-bg);}
.sched-date-box{width:42px;text-align:center;flex-shrink:0;}
.sched-date-box .d{font-size:17px;font-weight:600;line-height:1;}
.sched-date-box .m{font-size:10.5px;color:var(--ink-faint);}
.sched-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.sched-info{flex:1;min-width:0;}
.sched-info .name{font-size:13.5px;font-weight:500;}
.sched-info .meta{font-size:11.5px;color:var(--ink-faint);}
.sched-info .others{font-size:11px;color:var(--sage);margin-top:2px;}
.countdown-badge{font-size:11px;padding:2px 9px;border-radius:999px;background:var(--accent-bg);color:var(--accent);flex-shrink:0;white-space:nowrap;}
.sched-del{flex-shrink:0;color:var(--ink-faint);cursor:pointer;font-size:15px;padding:4px;}

/* ---- resource/support tab block ---- */
.subtab-row{display:flex;gap:6px;margin-bottom:14px;}
.subtab{font-size:13px;padding:7px 16px;border-radius:999px;border:1px solid var(--line);background:var(--paper);cursor:pointer;color:var(--ink-soft);}
.subtab.active{background:var(--sage);color:#fff;border-color:var(--sage);}
.res-progress{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.res-progress .bar-wrap{flex:1;height:7px;background:var(--line);border-radius:999px;overflow:hidden;}
.res-progress .bar{height:100%;background:var(--sage);border-radius:999px;transition:width .3s;}
.res-progress .pct{font-size:12.5px;color:var(--ink-soft);min-width:66px;text-align:right;}
.res-cat-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.res-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:var(--paper-card);margin-bottom:6px;}
.res-item.done{opacity:.55;}
.res-item.done .res-name{text-decoration:line-through;}
.res-check{width:19px;height:19px;border-radius:50%;border:2px solid var(--line-strong);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;}
.res-check.on{background:var(--sage);border-color:var(--sage);color:#fff;}
.res-name{font-size:13px;flex:1;}
.res-cat{font-size:10.5px;color:var(--ink-faint);background:var(--paper);padding:2px 8px;border-radius:999px;}
.res-del{color:var(--ink-faint);cursor:pointer;font-size:14px;flex-shrink:0;}

.support-card{background:var(--paper-card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px;position:relative;}
.support-card .top-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.support-card .icon{width:32px;height:32px;border-radius:9px;background:var(--accent-bg);color:var(--accent);display:flex;align-items:center;justify-content:center;margin-bottom:8px;flex-shrink:0;}
.support-card h4{margin:0 0 4px;font-size:14px;font-weight:500;}
.support-card p{margin:0;font-size:12.5px;color:var(--ink-soft);white-space:pre-wrap;}
.support-card .edit-btn{color:var(--ink-faint);cursor:pointer;font-size:15px;flex-shrink:0;}
.song-tag{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:5px 11px;border-radius:999px;background:var(--sage-bg);color:var(--sage);margin:0 6px 6px 0;}

/* ---- emotion (secondary position) ---- */
.emo-check{text-align:center;padding:6px 0 16px;}
.emo-face{font-family:'Caveat',cursive;font-size:22px;margin-bottom:6px;color:var(--ink-soft);}
.emo-wrap{max-width:400px;margin:0 auto;}
input.emo-range{width:100%;height:6px;border-radius:999px;-webkit-appearance:none;background:linear-gradient(90deg,var(--gold) 0%,var(--line) 50%,var(--sage) 100%);outline:none;margin:14px 0 6px;}
input.emo-range::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--paper-card);border:2px solid var(--accent);cursor:pointer;}
.emo-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--ink-faint);}
.emo-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;justify-content:center;}
.emo-chip{font-size:12px;padding:5px 12px;border-radius:999px;border:1px solid var(--line);background:var(--paper-card);cursor:pointer;color:var(--ink-soft);}
.emo-chip.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.emo-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--line);}
.emo-row .bar-wrap{flex:1;height:6px;background:var(--line);border-radius:999px;overflow:hidden;}
.emo-row .bar{height:100%;border-radius:999px;}
.emo-row .date{font-size:11.5px;color:var(--ink-faint);min-width:60px;}
.emo-row .val{font-size:11.5px;color:var(--ink-soft);min-width:28px;text-align:right;}
.emo-insight{background:var(--sage-bg);color:var(--sage);border-radius:10px;padding:11px 13px;font-size:12.5px;margin-top:14px;display:flex;gap:8px;align-items:flex-start;}
.emo-insight.warn{background:var(--gold-bg);color:var(--gold);}
.collapse-toggle{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:2px 0;}
.collapse-toggle i{transition:transform .2s;color:var(--ink-faint);}
.collapse-toggle.open i{transform:rotate(180deg);}

/* ---- idol profile header ---- */
.idol-header{position:relative;border-radius:var(--radius-card);overflow:hidden;margin-bottom:16px;border:1px solid var(--line);}
.idol-header-bg{height:96px;width:100%;}
.idol-header-body{background:var(--paper-card);padding:0 20px 18px;position:relative;}
.idol-avatar{width:76px;height:76px;border-radius:50%;border:4px solid var(--paper-card);margin-top:-38px;background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;font-weight:600;}
.idol-name-row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-top:10px;flex-wrap:wrap;}
.idol-name{font-size:20px;font-weight:600;margin:0;}
.idol-meta{font-size:12.5px;color:var(--ink-soft);margin-top:3px;display:flex;gap:12px;flex-wrap:wrap;}
.idol-meta span{display:flex;align-items:center;gap:4px;}

/* ---- stats row ---- */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px;}
.stat{background:var(--paper-card);border:1px solid var(--line);border-radius:12px;padding:13px 15px;}
.stat-num{font-size:22px;font-weight:600;color:var(--accent);}
.stat-label{font-size:11.5px;color:var(--ink-soft);margin-top:2px;}

/* ---- achievement timeline ---- */
.wrapped-card{background:linear-gradient(160deg,var(--accent) 0%,#5A211E 100%);color:#FBF3EA;border-radius:var(--radius-card);padding:22px;margin-bottom:18px;}
.wrapped-card h3{margin:0 0 4px;font-size:18px;font-weight:600;}
.wrapped-card p{margin:0;font-size:12.5px;opacity:.85;}
.wrapped-stats{display:flex;gap:22px;margin-top:14px;flex-wrap:wrap;}
.wrapped-stats div{font-size:24px;font-weight:600;}
.wrapped-stats span{display:block;font-size:10.5px;opacity:.8;font-weight:400;margin-top:2px;}
.ach-year{font-size:14.5px;font-weight:600;color:var(--ink-soft);margin:20px 0 9px;display:flex;align-items:center;gap:8px;}
.ach-year::after{content:'';flex:1;height:1px;background:var(--line);}
.ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:9px;}
.ach-item{background:var(--paper-card);border:1px solid var(--line);border-radius:10px;padding:11px 13px;display:flex;gap:9px;align-items:flex-start;}
.ach-icon{width:29px;height:29px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;}
.ach-name{font-size:13px;font-weight:500;}
.ach-date{font-size:10.5px;color:var(--ink-faint);}

/* ---- meeting/event log ---- */
.meeting-type{font-size:11px;padding:3px 9px;border-radius:6px;background:var(--accent-bg);color:var(--accent);display:inline-block;margin-bottom:6px;}
.meeting-title{font-size:15.5px;font-weight:500;margin:0 0 2px;}
.meeting-date{font-size:11.5px;color:var(--ink-faint);}
.exchange{display:flex;gap:9px;margin-bottom:8px;align-items:flex-start;}
.exchange .who{font-size:11.5px;color:var(--ink-faint);min-width:32px;padding-top:3px;flex-shrink:0;}
.exchange.me .who{color:var(--accent);}
.exchange .txt{font-size:13.5px;background:var(--paper);padding:8px 11px;border-radius:9px;flex:1;}
.exchange.me .txt{background:var(--accent-bg);}
.meeting-note{font-size:12.5px;color:var(--ink-soft);margin-top:9px;font-style:italic;border-top:1px dashed var(--line);padding-top:9px;}
.anniversary-badge{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:var(--gold);background:var(--gold-bg);padding:4px 10px;border-radius:999px;margin-bottom:11px;}

/* ---- customization panel ---- */
.color-swatch-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.color-swatch{width:30px;height:30px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
.color-swatch.selected{border-color:var(--ink);}
input[type=color]{width:44px;height:32px;padding:2px;border-radius:8px;border:1px solid var(--line);cursor:pointer;background:#fff;}

::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:999px;}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="fab-wrap" id="fab-wrap"></div>
<script src="state.js"></script>
<script src="components.js"></script>
<script src="pages.js"></script>
<script src="main.js"></script>
</body>
</html>
